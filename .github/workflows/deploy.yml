name: CD
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, staging, prod]
        default: dev
permissions:
  contents: read
  packages: write
env:
  IMAGE: ghcr.io/${{ github.repository }}
jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs: { tag: ${{ steps.meta.outputs.tag }} }
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: ${{ github.actor }}, password: ${{ secrets.GITHUB_TOKEN }} }
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }},${{ env.IMAGE }}:latest

  deploy-dev:
    needs: build-push
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Configure kubeconfig
        run: 'echo "${{ secrets.KUBE_CONFIG_DEV }}" > kubeconfig'
      - name: Helm upgrade (dev)
        run: |
          KUBECONFIG=kubeconfig helm upgrade --install talero deploy/helm/talero \
            -n talero-dev --create-namespace \
            -f deploy/helm/talero/values-dev.yaml \
            --set image.tag=${{ needs.build-push.outputs.tag }}

  deploy-staging:
    needs: [build-push, deploy-dev]
    runs-on: ubuntu-latest
    environment: staging   # add required reviewers in GitHub for gated promotion
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: 'echo "${{ secrets.KUBE_CONFIG_STAGING }}" > kubeconfig'
      - run: |
          KUBECONFIG=kubeconfig helm upgrade --install talero deploy/helm/talero \
            -n talero-staging --create-namespace \
            -f deploy/helm/talero/values-staging.yaml \
            --set image.tag=${{ needs.build-push.outputs.tag }}

  deploy-prod:
    needs: [build-push, deploy-staging]
    runs-on: ubuntu-latest
    environment: prod      # add required reviewers in GitHub for manual approval
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: 'echo "${{ secrets.KUBE_CONFIG_PROD }}" > kubeconfig'
      - run: |
          KUBECONFIG=kubeconfig helm upgrade --install talero deploy/helm/talero \
            -n talero-prod --create-namespace \
            -f deploy/helm/talero/values-prod.yaml \
            --set image.tag=${{ needs.build-push.outputs.tag }}
