@media (max-width: 980px) { .mk-grid { grid-template-columns: 1fr; } }

/* ===================================================================
   ONBOARDING / AOP (TAL-48)
   =================================================================== */
.aop-banner { display: flex; align-items: center; gap: 13px; padding: 14px 16px; border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--line)); background: color-mix(in srgb, var(--accent) 7%, transparent); border-radius: var(--radius); }
.aop-banner-b { display: flex; flex-direction: column; gap: 2px; }
.aop-banner-b b { font-size: 13.5px; } .aop-banner-b small { font-size: 12px; color: var(--text-2); line-height: 1.5; }
.aop-steprail { display: flex; align-items: flex-start; gap: 0; padding: 18px 20px; }
.aop-step { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 6px; background: transparent; border: 0; cursor: pointer; color: var(--text-3); padding: 0 6px; }
.aop-step-n { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--line-strong); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; transition: .15s; }
.aop-step-t { font-size: 12px; font-weight: 700; color: var(--text-3); white-space: nowrap; }
.aop-step.on .aop-step-n { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 14%, transparent); }
.aop-step.on .aop-step-t { color: var(--text); }
.aop-step.done .aop-step-n { background: var(--accent); color: var(--accent-ink); border-color: transparent; }
.aop-step.done .aop-step-t { color: var(--text-2); }
.aop-step-line { flex: 1; height: 2px; background: var(--line-strong); margin-top: 15px; border-radius: 2px; min-width: 16px; }
.aop-step-line.done { background: var(--accent); }
.aop-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 15px 16px; }
.aop-uploads { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.upload-box { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 5px; padding: 24px 16px; border: 1.5px dashed var(--line-strong); border-radius: var(--radius-sm); }
.upload-ic { width: 44px; height: 44px; border-radius: 50%; background: var(--panel-3); color: var(--text-2); display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
.upload-box b { font-size: 13px; } .upload-box small { font-size: 11.5px; color: var(--text-3); margin-bottom: 8px; }
.agree-list { list-style: none; margin: 0 0 4px; padding: 0; display: flex; flex-direction: column; }
.agree-row { display: flex; align-items: center; gap: 12px; padding: 13px 4px; border-bottom: 1px solid var(--line); }
.agree-list .agree-row:last-child { border-bottom: 0; }
.aop-econsent { border-top: 1px solid var(--line); margin-top: 4px; cursor: pointer; }
.checkbox { width: 22px; height: 22px; flex-shrink: 0; border-radius: 6px; border: 1.5px solid var(--line-strong); background: var(--panel-2); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--accent-ink); transition: .15s; }
.checkbox.on { background: var(--accent); border-color: transparent; }
.agree-t { flex: 1; font-size: 13px; color: var(--text); }
.agree-opt { color: var(--text-3); font-size: 11.5px; }
.aop-review { margin-top: 4px; }
.aop-foot { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding-top: 18px; margin-top: 18px; border-top: 1px solid var(--line); }
.aop-done { text-align: center; display: flex; flex-direction: column; align-items: center; padding: 32px 24px; }
.aop-done-ic { width: 60px; height: 60px; border-radius: 50%; background: color-mix(in srgb, var(--pos) 16%, transparent); color: var(--pos); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
.aop-done-h { font-size: 22px; font-weight: 800; letter-spacing: -.01em; margin: 0 0 8px; }
.aop-done-sub { font-size: 13.5px; color: var(--text-2); max-width: 560px; line-height: 1.6; margin: 0 0 24px; }
.aop-journey { max-width: 560px; width: 100%; margin: 0 0 24px; }
.aop-done-cta { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
.aop-redirect { display: flex; align-items: center; gap: 14px; }
.aop-redirect > div { flex: 1; } .aop-redirect b { font-size: 14px; display: block; } .aop-redirect small { font-size: 12px; color: var(--text-2); }
@media (max-width: 760px) {
  .aop-fields, .aop-uploads { grid-template-columns: 1fr; }
  .aop-steprail { overflow-x: auto; }
  .aop-step-t { font-size: 10.5px; }
}
.locked { position: relative; }
.locked-inner { filter: blur(7px); pointer-events: none; user-select: none; }
.locked-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 9px; text-align: center; padding: 24px; border-radius: var(--radius); background: color-mix(in srgb, var(--bg) 45%, transparent); }
.locked-ic { width: 48px; height: 48px; border-radius: 50%; background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--accent); display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }
.locked-title { font-size: 14.5px; font-weight: 700; color: var(--text); }
.locked-msg { max-width: 280px; margin: 0 0 4px; font-size: 12.5px; line-height: 1.55; color: var(--text-2); text-align: center; }
.locked-msg b { color: var(--text); font-weight: 700; white-space: nowrap; }
.locked-i { display: inline-flex; vertical-align: -2px; color: var(--accent); margin-right: 5px; }

/* ===== Funding & Withdrawals (TAL-13) ===== */
.method-list { display: flex; flex-direction: column; gap: 8px; }
.method-row { display: flex; align-items: center; gap: 11px; padding: 11px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--panel-2); cursor: pointer; text-align: left; color: var(--text); width: 100%; }
.method-row.on { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
.method-row:disabled { opacity: .5; cursor: not-allowed; }
.method-meta { flex: 1; display: flex; flex-direction: column; gap: 1px; }
.method-meta b { font-size: 13px; } .method-meta small { font-size: 11.5px; color: var(--text-3); }
.method-avail { font-size: 11px; color: var(--text-2); white-space: nowrap; }
.flow-note { display: flex; gap: 8px; align-items: flex-start; font-size: 11.5px; color: var(--text-2); margin-top: 12px; padding: 10px 12px; border-radius: var(--radius-sm); background: var(--panel-2); line-height: 1.5; }
.flow-note svg { flex-shrink: 0; margin-top: 1px; color: var(--text-3); }
.flow-note.warn { background: color-mix(in srgb, var(--warn) 10%, transparent); } .flow-note.warn svg { color: var(--warn); }
.flow-cta { width: 100%; justify-content: center; margin-top: 14px; }
.flow-cta:disabled { opacity: .5; cursor: not-allowed; }
.withdraw-avail { display: flex; justify-content: space-between; align-items: center; padding: 14px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--panel-2); }
.withdraw-avail span { font-size: 12px; color: var(--text-3); } .withdraw-avail b { font-size: 20px; }
.fld-hint.neg { color: var(--neg); }
.tdir { display: inline-flex; align-items: center; gap: 5px; font-weight: 700; font-size: 12px; }
.tdir.in { color: var(--pos); } .tdir.out { color: var(--neg); }

/* ===== Funding wizard (configured UI · TAL-13) ===== */
.fund-layout { display: grid; grid-template-columns: minmax(0,1fr) 320px; gap: 18px; align-items: start; }
@media (max-width: 1080px) { .fund-layout { grid-template-columns: 1fr; } }
.wz-card { padding: 0; overflow: hidden; }
.wz-tabs { display: flex; gap: 2px; padding: 14px 18px 0; }
.wz-tab { flex: 1; border: 0; background: transparent; color: var(--text-3); font-family: inherit; font-weight: 700; font-size: 14px; padding: 11px 0 14px; cursor: pointer; position: relative; letter-spacing: -.01em; }
.wz-tab.on { color: var(--text); }
.wz-tab.on::after { content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: var(--accent); border-radius: 2px; }
.wz-tabs { border-bottom: 1px solid var(--line); }

/* horizontal step rail */
.wz-steps { list-style: none; display: flex; align-items: center; margin: 0; padding: 18px 22px 6px; }
.wz-st { display: flex; align-items: center; gap: 9px; }
.wz-st-dot { width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; font-size: 11.5px; font-weight: 700; flex-shrink: 0;
  background: var(--panel-3); color: var(--text-3); border: 1px solid var(--line-strong); transition: .18s; }
.wz-st.done .wz-st-dot { background: color-mix(in srgb, var(--accent) 18%, transparent); color: var(--accent); border-color: transparent; }
.wz-st.current .wz-st-dot { background: var(--accent); color: var(--accent-ink); border-color: transparent; box-shadow: 0 0 0 4px var(--glow); }
.wz-st-l { font-size: 12px; font-weight: 600; color: var(--text-3); white-space: nowrap; }
.wz-st.done .wz-st-l, .wz-st.current .wz-st-l { color: var(--text); }
.wz-st-bar { flex: 1; height: 2px; background: var(--line-strong); margin: 0 10px; border-radius: 2px; min-width: 14px; }
.wz-st-bar.done { background: color-mix(in srgb, var(--accent) 55%, transparent); }
@media (max-width: 560px) { .wz-st-l { display: none; } }

.wz-body { padding: 8px 22px 4px; }
.wz-h { font-size: 16px; font-weight: 700; letter-spacing: -.01em; margin: 6px 0 2px; }
.wz-sub { font-size: 12.5px; color: var(--text-2); margin: 0 0 16px; line-height: 1.5; }
.wz-foot { display: flex; gap: 10px; align-items: center; padding: 16px 22px 20px; border-top: 1px solid var(--line); margin-top: 16px; }
.wz-foot .btn { justify-content: center; }
.wz-foot .wz-next { flex: 1; }
.wz-foot .wz-back { min-width: 96px; }

/* linked-bank selector */
.bank-list { display: flex; flex-direction: column; gap: 8px; }
.bank-row { display: flex; align-items: center; gap: 12px; padding: 13px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--panel-2); cursor: pointer; text-align: left; color: var(--text); width: 100%; }
.bank-row.on { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
.bank-meta { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.bank-meta b { font-size: 13.5px; } .bank-meta small { font-size: 11.5px; color: var(--text-3); }
.bank-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--line-strong); flex-shrink: 0; }
.bank-row.on .bank-radio { border-color: var(--accent); background: radial-gradient(circle at center, var(--accent) 0 5px, transparent 6px); }
.bank-verified { font-size: 10.5px; font-weight: 700; color: var(--pos); display: inline-flex; align-items: center; gap: 4px; }
.plaid-add { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 13px; border: 1px dashed var(--line-strong); border-radius: var(--radius-sm); background: transparent; color: var(--accent); font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; width: 100%; }
.plaid-add:hover { background: var(--panel-2); }
.plaid-linking { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 30px 16px; text-align: center; }
.plaid-spin { width: 34px; height: 34px; border-radius: 50%; border: 3px solid var(--line-strong); border-top-color: var(--accent); animation: wz-spin .8s linear infinite; }
@keyframes wz-spin { to { transform: rotate(360deg); } }
.plaid-linking b { font-size: 14px; } .plaid-linking small { font-size: 12px; color: var(--text-3); max-width: 260px; }

/* wire / destination instructions */
.wire-instr { border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; }
.wire-row { display: flex; align-items: center; gap: 10px; padding: 11px 13px; border-bottom: 1px solid var(--line); }
.wire-row:last-child { border-bottom: 0; }
.wire-k { font-size: 11px; color: var(--text-3); width: 138px; flex-shrink: 0; font-weight: 600; }
.wire-v { flex: 1; font-size: 13px; font-weight: 600; word-break: break-word; }
.wire-copy { width: 30px; height: 30px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel-2); color: var(--text-3); cursor: pointer; display: grid; place-items: center; flex-shrink: 0; }
.wire-copy:hover { color: var(--text); border-color: var(--line-strong); }
.wire-row.ref { background: color-mix(in srgb, var(--accent) 9%, transparent); }
.wire-row.ref .wire-k { color: var(--accent); } .wire-row.ref .wire-v { color: var(--accent); font-family: 'Space Grotesk', monospace; }
.wire-ack { display: flex; align-items: flex-start; gap: 10px; margin-top: 14px; padding: 12px 13px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--panel-2); cursor: pointer; }
.wire-ack input { margin-top: 2px; accent-color: var(--accent); width: 16px; height: 16px; flex-shrink: 0; }
.wire-ack span { font-size: 12.5px; color: var(--text-2); line-height: 1.5; }

/* card form */
.card-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.card-form .fld-full { grid-column: 1 / -1; }
.card-brandrow { display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--text-3); margin-top: 12px; }
.card-brandrow svg { color: var(--text-3); }

/* amount */
.amount-big { position: relative; display: flex; align-items: center; }
.amount-big .amount-cur { position: absolute; left: 16px; font-size: 26px; font-weight: 700; color: var(--text-3); }
.amount-big input { width: 100%; background: var(--panel-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 16px 16px 40px; color: var(--text); font-family: 'Space Grotesk', monospace; font-size: 30px; font-weight: 700; outline: 0; letter-spacing: -.01em; }
.amount-big input:focus { border-color: color-mix(in srgb, var(--accent) 55%, var(--line)); }
.amount-chips { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.amount-chip { border: 1px solid var(--line); background: var(--panel-2); color: var(--text-2); border-radius: var(--radius-pill); padding: 6px 13px; font-size: 12.5px; font-weight: 600; font-family: 'Space Grotesk', monospace; cursor: pointer; }
.amount-chip:hover { border-color: var(--line-strong); color: var(--text); }

/* review */
.review-rows { display: flex; flex-direction: column; border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; }
.review-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--line); font-size: 13px; }
.review-row:last-child { border-bottom: 0; }
.review-k { color: var(--text-3); font-weight: 600; }
.review-v { font-weight: 700; text-align: right; }
.review-row.total { background: var(--panel-2); } .review-row.total .review-v { font-size: 15px; }
.instant-bp { display: flex; gap: 11px; align-items: flex-start; margin-top: 14px; padding: 13px 14px; border-radius: var(--radius-sm); border: 1px solid color-mix(in srgb, var(--pos) 30%, transparent); background: color-mix(in srgb, var(--pos) 8%, transparent); }
.instant-bp svg { color: var(--pos); flex-shrink: 0; margin-top: 1px; }
.instant-bp b { font-size: 13px; } .instant-bp small { display: block; font-size: 11.5px; color: var(--text-2); margin-top: 2px; line-height: 1.5; }
.instant-amt { font-family: 'Space Grotesk', monospace; color: var(--pos); }
.sms-box { margin-top: 14px; padding: 14px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--panel-2); }
.sms-top { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 700; margin-bottom: 4px; } .sms-top svg { color: var(--warn); }
.sms-row { display: flex; gap: 9px; margin-top: 10px; }
.sms-row input { flex: 1; font-family: 'Space Grotesk', monospace; letter-spacing: .3em; text-align: center; }

/* success */
.wz-done { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; padding: 34px 22px 30px; }
.wz-done-ic { width: 56px; height: 56px; border-radius: 50%; display: grid; place-items: center; color: var(--pos); background: color-mix(in srgb, var(--pos) 15%, transparent); margin-bottom: 6px; }
.wz-done h3 { font-size: 18px; margin: 0; letter-spacing: -.01em; }
.wz-done p { font-size: 13px; color: var(--text-2); margin: 0; max-width: 360px; line-height: 1.55; }
.wz-done .mono { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.wz-done-acts { display: flex; gap: 10px; margin-top: 14px; }

/* summary rail */
.fund-sum { position: sticky; top: 14px; }
.sum-head { display: flex; align-items: center; gap: 9px; padding-bottom: 14px; border-bottom: 1px solid var(--line); margin-bottom: 14px; }
.sum-head b { font-size: 14px; } .sum-head small { font-size: 11px; color: var(--text-3); display: block; }
.sum-rows { display: flex; flex-direction: column; gap: 11px; }
.sum-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; font-size: 12.5px; }
.sum-row .sk { color: var(--text-3); flex-shrink: 0; } .sum-row .sv { font-weight: 700; text-align: right; line-height: 1.4; }
.sum-row .sv.muted { color: var(--text-3); font-weight: 600; }
.sum-dest { margin-top: 14px; padding: 12px 13px; border-radius: var(--radius-sm); background: var(--panel-2); border: 1px solid var(--line); }
.sum-dest .eyebrow { margin-bottom: 5px; }
.sum-dest b { font-size: 12.5px; display: block; } .sum-dest small { font-size: 11px; color: var(--text-3); }
.sum-secure { display: flex; gap: 8px; align-items: flex-start; margin-top: 14px; font-size: 11px; color: var(--text-3); line-height: 1.5; }
.sum-secure svg { flex-shrink: 0; margin-top: 1px; }

/* ===== Billing (TAL-10) ===== */
.pay-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
.pay-card { border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 16px; background: linear-gradient(135deg, var(--panel-2), var(--panel-3)); }
.pay-top { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; font-weight: 700; font-size: 13px; }
.pay-top svg { color: var(--accent); }
.pay-num { font-size: 14px; letter-spacing: .08em; margin-bottom: 6px; }
.pay-exp { font-size: 11.5px; color: var(--text-3); }

/* ===== Certificates (TAL-14) ===== */
.cert-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.cert-card { border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; background: var(--panel-2); }
.cert-preview { position: relative; aspect-ratio: 1.6; background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 18%, var(--panel-3)), var(--panel-3)); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border-bottom: 1px solid var(--line); }
.cert-mark { color: var(--accent); }
.cert-brand { font-size: 11px; letter-spacing: .3em; font-weight: 800; color: var(--accent); }
.cert-amt { font-size: 22px; font-weight: 700; }
.cert-cap { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-3); }

/* ===== Tournaments (TAL-12) ===== */

/* ===== Statements & Documents v2 — action model (TAL-18) ===== */
/* action summary chips */

.stmt-callout a.dash-link:hover { text-decoration: underline; }

/* ===== Document reader / e-sign drawer ===== */
.doc-reader { position: fixed; inset: 0; z-index: 80; display: flex; align-items: center; justify-content: center; padding: 24px; background: color-mix(in srgb, var(--bg) 60%, transparent); animation: fade-in .14s ease; }
.dr-card { width: 660px; max-width: 100%; max-height: 88vh; background: var(--panel); border: 1px solid var(--line-strong); border-radius: var(--radius); box-shadow: 0 30px 70px -28px rgba(0,0,0,.78); display: flex; flex-direction: column; overflow: hidden; }
.dr-head { display: flex; align-items: flex-start; gap: 12px; padding: 18px 20px 15px; border-bottom: 1px solid var(--line); }
.dr-head .dr-tile { width: 36px; height: 36px; border-radius: 10px; background: var(--panel-3); color: var(--text-2); display: grid; place-items: center; flex-shrink: 0; }
.dr-head-t { flex: 1; min-width: 0; }

.sym-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--line-strong); flex-shrink: 0; }

.dev-table { display: flex; flex-direction: column; }
.dev-head, .dev-row { display: grid; grid-template-columns: 1.4fr 1fr 1.2fr 1.2fr 1.1fr .6fr; gap: 12px; align-items: center; }
.dev-head { padding: 0 4px 10px; border-bottom: 1px solid var(--line); }

.dev-act { justify-self: end; }
@media (max-width: 820px) {
  .dev-head { display: none; }
  .dev-row { grid-template-columns: 1fr 1fr; border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px; padding: 13px; background: var(--panel-2); }
  .dev-row > span { display: flex; flex-direction: column; gap: 3px; }

/* ===== generic sprint tables ===== */
.ttable, .mtable, .rtable, .stmt-table, .acct-table { display: flex; flex-direction: column; }
.ttable-head, .ttable-row, .mtable-head, .mtable-row, .rtable-head, .rtable-row, .stmt-head, .stmt-row, .acct-head, .acct-row { display: grid; gap: 12px; align-items: center; }

.mtable-act, .rtable-act, .stmt-act, .acct-act { justify-self: end; }
.ttable-head, .ttable-row { grid-template-columns: 1fr .8fr 1fr .9fr 1.4fr 1.6fr 1.2fr; }
.ttable-row.clickable { cursor: pointer; transition: background .12s; }

.ttable-row.open { background: var(--panel-2); }
.tx-ref { display: inline-flex; align-items: center; }
.tx-chev { margin-left: 6px; display: inline-flex; transform: rotate(90deg); transition: transform .18s; color: var(--text-3); }
.tx-chev.up { transform: rotate(-90deg); }
.tx-track { padding: 16px 14px 18px; border-bottom: 1px solid var(--line); background: var(--panel-2); }

.stepper { list-style: none; display: flex; align-items: flex-start; margin: 0; padding: 0; max-width: 640px; }

.step:not(:last-child)::after { content: ''; position: absolute; top: 13px; left: 50%; width: 100%; height: 2px; background: var(--line-strong); z-index: 0; }
.step.done::after { background: var(--accent); }
.step-dot { position: relative; z-index: 1; width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--line-strong); background: var(--panel); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--text-3); }
.step.done .step-dot { background: var(--accent); color: var(--accent-ink); border-color: transparent; }
.step.current .step-dot { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 14%, transparent); }

@media (max-width: 820px) {

  .step { flex-direction: row; gap: 10px; }

  .step-l { max-width: none; }

.mtable-head, .mtable-row { grid-template-columns: .8fr 1.5fr 1.1fr .8fr 1fr .9fr .7fr; }

.acct-id { font-size: 13px; margin-right: 8px; }
.acct-act { display: flex; gap: 6px; align-items: center; }

}

/* ===================================================================
   FLOATING CHAT / TICKET WIDGET
   =================================================================== */
.chatw { position: fixed; right: 24px; bottom: 24px; z-index: 60; display: flex; flex-direction: column; align-items: flex-end; gap: 14px; }
.chatw-fab { position: relative; width: 60px; height: 60px; border-radius: 50%; border: 0; cursor: pointer; background: var(--accent); color: var(--accent-ink); display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px color-mix(in srgb, var(--accent) 40%, transparent), 0 2px 8px rgba(0,0,0,.3); transition: transform .16s, filter .16s; }
.chatw-fab:hover { transform: translateY(-2px); filter: brightness(1.05); }
.chatw-fab:active { transform: translateY(0); }
.chatw-fab-ic { display: flex; }
.chatw-badge { position: absolute; top: -2px; right: -2px; min-width: 20px; height: 20px; padding: 0 5px; border-radius: 10px; background: var(--neg); color: #fff; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); }
.chatw-panel { width: 376px; max-width: calc(100vw - 36px); height: 520px; max-height: calc(100vh - 120px); background: var(--bg-2); border: 1px solid var(--line); border-radius: 18px; box-shadow: 0 24px 60px rgba(0,0,0,.45); display: flex; flex-direction: column; overflow: hidden; animation: chatw-in .2s cubic-bezier(.2,.8,.2,1); }
@keyframes chatw-in { from { opacity: 0; transform: translateY(12px) scale(.98); } to { opacity: 1; transform: none; } }
.chatw-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 16px; background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 20%, var(--bg-2)), var(--bg-2)); border-bottom: 1px solid var(--line); }
.chatw-head-l { display: flex; align-items: center; gap: 11px; }
.chatw-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); color: var(--accent-ink); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.chatw-who b { font-size: 14px; display: block; }
.chatw-who small { font-size: 11.5px; color: var(--text-2); display: inline-flex; align-items: center; gap: 6px; }
.chatw-x { width: 30px; height: 30px; border-radius: 8px; border: 0; background: transparent; color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.chatw-x:hover { background: var(--panel); color: var(--text); }
.chatw-tabs { display: flex; padding: 8px 8px 0; gap: 4px; background: var(--bg-2); border-bottom: 1px solid var(--line); }
.chatw-tab { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px; border: 0; background: transparent; color: var(--text-3); font-family: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
.chatw-tab svg { flex-shrink: 0; }
.chatw-tab:hover { color: var(--text-2); }
.chatw-tab.on { color: var(--accent); border-bottom-color: var(--accent); }
.chatw-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: var(--bg); }
.chatw-body::-webkit-scrollbar { width: 8px; }
.chatw-body::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 8px; }
.chatw-input { display: flex; align-items: center; gap: 9px; padding: 12px; border-top: 1px solid var(--line); background: var(--bg-2); }
.chatw-input input { flex: 1; background: var(--panel-2); border: 1px solid var(--line); border-radius: var(--radius-pill); outline: 0; color: var(--text); font-family: inherit; font-size: 13px; padding: 10px 14px; }
.chatw-input input:focus { border-color: color-mix(in srgb, var(--accent) 60%, var(--line)); }
.chatw-input input::placeholder { color: var(--text-3); }
.chatw-send { width: 38px; height: 38px; flex-shrink: 0; border-radius: 50%; border: 0; background: var(--accent); color: var(--accent-ink); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.chatw-send:hover { filter: brightness(1.06); }
.chatw-ticket { background: var(--bg-2); }
.chatw-form { display: flex; flex-direction: column; gap: 13px; }
.chatw-form textarea { width: 100%; background: var(--panel-2); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-family: inherit; font-size: 13.5px; outline: 0; resize: vertical; }
.chatw-form textarea:focus { border-color: color-mix(in srgb, var(--accent) 60%, var(--line)); }
.chatw-submit { width: 100%; justify-content: center; margin-top: 2px; }
.chatw-submit:disabled { opacity: .5; cursor: not-allowed; }
.chatw-note { font-size: 11px; color: var(--text-3); text-align: center; margin: 0; }
.chatw-success { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; margin: auto; padding: 20px; }
.chatw-success-ic { width: 52px; height: 52px; border-radius: 50%; background: color-mix(in srgb, var(--pos) 16%, transparent); color: var(--pos); display: flex; align-items: center; justify-content: center; }
.chatw-success b { font-size: 15px; } .chatw-success small { font-size: 12px; color: var(--text-2); max-width: 240px; }
@media (max-width: 560px) {
  .chatw { right: 16px; bottom: 84px; }
  .chatw-panel { height: calc(100vh - 160px); }
}

/* ===== sprint responsive ===== */
@media (max-width: 1100px) {
  .metric-grid { grid-template-columns: repeat(2, 1fr); }
  .dash-grid { grid-template-columns: repeat(2, 1fr); }
  .plat-hero { grid-template-columns: 1fr; }
  .plat-hero-side { border-left: 0; border-top: 1px solid var(--line); }
  .plat-feats { grid-template-columns: 1fr; }
}
@media (max-width: 980px) {
  .rail-2 { grid-template-columns: 1fr; }
  .dash-hero { grid-template-columns: 1fr; }
  .dash-journey { border-left: 0; border-top: 1px solid var(--line); padding-left: 0; padding-top: 18px; }
}
@media (max-width: 820px) {
  .metric-grid { grid-template-columns: 1fr 1fr; }
  .dash-grid { grid-template-columns: 1fr; }
  .datarow { grid-template-columns: 1fr; }
  .ttable-head, .mtable-head, .rtable-head, .stmt-head, .acct-head { display: none; }
  .acct-summary { grid-template-columns: 1fr 1fr; }
  .acct-cards { grid-template-columns: 1fr; }
  .ttable-row, .mtable-row, .rtable-row, .stmt-row, .acct-row { grid-template-columns: 1fr 1fr !important; border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px; padding: 13px; background: var(--panel-2); }
  .ttable-row > span, .mtable-row > span, .rtable-row > span, .stmt-row > span, .acct-row > span { display: flex; flex-direction: column; gap: 3px; justify-self: start !important; text-align: left !important; }
  .ttable-row > span::before, .mtable-row > span::before, .rtable-row > span::before, .stmt-row > span::before, .acct-row > span::before { content: attr(data-k); font-size: 9px; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); font-weight: 700; }
  .mtable-act, .rtable-act, .stmt-act, .acct-act { grid-column: 1 / -1; }
}

<script>
/* Talero live-data bootstrap — gate on session + fetch real account data before render. */
(function () {
  var token = null;
  try { token = localStorage.getItem('talero_token'); } catch (e) {}
  if (!token) { window.location.replace('/auth'); return; }
  var h = { 'Authorization': 'Bearer ' + token };
  window.__TALERO_BOOT__ = (async function () {
    try {
      var meR = await fetch('/app/me', { headers: h });
      var me = await meR.json();
      if (!meR.ok || me.errorText) { try { localStorage.removeItem('talero_token'); } catch (e) {} window.location.replace('/auth'); return null; }
      var accts = me.accounts || [];
      var primary = accts.filter(function (a) { return a.primary; })[0] || accts[0];
      if (!primary) {
        var oR = await fetch('/app/account/open', { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, h), body: JSON.stringify({ legalStatus: 'Individual', nickname: 'My Futures Account' }) });
        primary = await oR.json(); accts = [primary];
      }
      var bundle = null;
      if (primary && primary.id != null) { var bR = await fetch('/app/account?id=' + primary.id, { headers: h }); bundle = await bR.json(); }
      return { user: me.user, accounts: accts, account: bundle && bundle.account, balance: bundle && bundle.balance, positions: bundle && bundle.positions, orders: bundle && bundle.orders };
    } catch (e) { return null; }
  })();
  function num(v, d) { var n = Number(v); return isNaN(n) ? d : n; }
  function rootSym(s) { return String(s || '').replace(/[A-Z]\d$/, '') || s; }
  window.__applyTaleroLive__ = function (data) {
    try {
      if (!data || !window.TD || !window.TD.LIVE) return;
      var L = window.TD.LIVE;
      if (data.user) window.__TALERO_USER__ = data.user;
      if (data.account) {
        L.account.id = String(data.account.id);
        if (data.account.nickname) L.account.nickname = data.account.nickname;
      }
      if (data.balance) {
        L.kpis.cashBalance = num(data.balance.cashBalance, L.kpis.cashBalance);
        L.kpis.buyingPower = num(data.balance.availableForTrading, L.kpis.buyingPower);
        L.kpis.realizedPnl = num(data.balance.realizedPnL, L.kpis.realizedPnl);
        L.kpis.unrealizedPnl = num(data.balance.openPnL, L.kpis.unrealizedPnl);
      }
      if (data.positions) {
        L.positions = data.positions.map(function (p) {
          var np = num(p.netPos, 0);
          return { sym: rootSym(p.symbol), name: p.symbol, exp: '', dir: (np >= 0 ? 'Long' : 'Short'), qty: Math.abs(np), avg: num(p.netPrice, 0), last: num(p.netPrice, 0), upnl: num(p.openPnL, 0), updated: 'live' };
        });
      }
    } catch (e) {}
  };
})();
</script>
