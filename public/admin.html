<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<script>
  (function () {
    function swallow(e) {
      var m = e && e.reason && (e.reason.message || e.reason);
      if (m && String(m).indexOf('Not implemented on this platform') !== -1) {
        e.preventDefault(); if (e.stopImmediatePropagation) e.stopImmediatePropagation(); return false;
      }
      if (m) { var d = document.getElementById('boot-err'); if (d) { d.style.display = 'block'; d.textContent = 'Error: ' + m; } }
    }
    window.addEventListener('unhandledrejection', swallow, true);
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Talero · Back Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============ THEME TOKENS (defaults; overridden by applyTheme) ============ */
:root, [data-theme="dark"] {
  --bg: #0a1120; --bg-2: #0e1729; --glow: rgba(79,163,255,0.13);
  --panel: #111d33; --panel-2: #16233f; --panel-3: #1d2c4b;
  --line: rgba(120,160,225,0.12); --line-strong: rgba(120,160,225,0.22);
  --text: #eaf1fb; --text-2: #9fb1cf; --text-3: #647394;
  --accent: #4fa3ff; --accent-ink: #06122a; --accent-2: #7ab9ff;
  --teal: #38bdf8; --info: #4fa3ff; --pos: #46d39a; --neg: #ff6b6b; --warn: #f5b13d;
  --ring-track: rgba(120,160,225,0.13);
  --chip-pos-bg: rgba(70,211,154,0.13); --chip-neg-bg: rgba(255,107,107,0.13);
  --shadow: 0 24px 60px -34px rgba(0,0,0,0.82); --tip-bg: #111d33;
  --radius: 14px; --radius-sm: 10px; --radius-pill: 20px;
}
[data-theme="light"] {
  --bg: #e8eef5; --bg-2: #eef3f8; --panel: #ffffff; --panel-2: #f4f8fc; --panel-3: #eaf1f9;
  --line: rgba(14,23,41,0.09); --line-strong: rgba(14,23,41,0.17);
  --text: #0e1729; --text-2: #475569; --text-3: #8593a8;
  --accent: #2e7fe0; --accent-ink: #ffffff; --shadow: 0 20px 44px -32px rgba(14,23,41,0.34);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Urbanist', system-ui, sans-serif; background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased; font-size: 14px; line-height: 1.5;
}
.mono { font-family: 'Space Grotesk', monospace; font-feature-settings: "tnum" 1; letter-spacing: -0.01em; }
.pos { color: var(--pos); } .neg { color: var(--neg); }
::selection { background: color-mix(in srgb, var(--accent) 40%, transparent); }
#boot-err { display:none; position:fixed; left:12px; bottom:12px; z-index:9999; background:#ff6b6b; color:#1a0606;
  padding:10px 14px; border-radius:8px; font-size:12px; font-family:'Space Grotesk',monospace; max-width:520px; }
.scroll::-webkit-scrollbar { width: 11px; height: 11px; }
.scroll::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 8px; border: 3px solid var(--bg); }
.scroll::-webkit-scrollbar-track { background: transparent; }
a { color: inherit; }

/* ============ SHELL ============ */
.shell { display: flex; min-height: 100vh; }
.sidebar {
  width: 250px; flex-shrink: 0; position: sticky; top: 0; align-self: flex-start; height: 100vh;
  background: var(--bg-2); border-right: 1px solid var(--line); display: flex; flex-direction: column;
  padding: 15px 13px 10px; gap: 4px; z-index: 30; transition: width .22s cubic-bezier(.4,0,.2,1);
}
.sidebar.collapsed { width: 64px; }
.sb-top { display: flex; align-items: center; gap: 10px; padding: 4px 8px 12px; min-height: 40px; }
.sb-logo { display: flex; flex-shrink: 0; }
.sb-word { display: flex; flex-direction: column; line-height: 1.05; white-space: nowrap; overflow: hidden; }
.sb-word b { font-size: 15px; font-weight: 700; letter-spacing: -.01em; }
.sb-word small { font-size: 8px; letter-spacing: .14em; color: var(--accent); font-weight: 700; }
.sb-admin-tag { margin-left:auto; display:inline-flex; align-items:center; gap:4px; font-size:8.5px; font-weight:800;
  letter-spacing:.1em; color:var(--warn); background:color-mix(in srgb, var(--warn) 14%, transparent);
  border:1px solid color-mix(in srgb, var(--warn) 32%, transparent); padding:3px 7px; border-radius:20px; white-space:nowrap; }
.sidebar.collapsed .sb-word, .sidebar.collapsed .sb-admin-tag, .sidebar.collapsed .navlabel,
.sidebar.collapsed .navbadge, .sidebar.collapsed .nav-group-label { display: none; }
.sidebar-nav { display: flex; flex-direction: column; gap: 2px; width: 100%; flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 8px; }
.sidebar-nav::-webkit-scrollbar { width: 0; }
.nav-group-label { font-size: 9.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-3);
  font-weight: 800; padding: 14px 12px 5px; }
.navitem {
  position: relative; width: 100%; padding: 9px 12px; border: 0; background: transparent; cursor: pointer;
  display: flex; flex-direction: row; align-items: center; gap: 11px; border-radius: var(--radius-sm);
  color: var(--text-2); transition: color .15s, background .15s; text-align: left;
}
.navitem .navicon { flex-shrink: 0; display: flex; }
.navitem .navlabel { font-size: 12.5px; font-weight: 600; letter-spacing: .01em; white-space: nowrap; }
.navitem:hover { color: var(--text); background: var(--panel); }
.navitem.active { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
.navitem.active::before { content:''; position:absolute; left:-13px; top:50%; transform:translateY(-50%);
  width:3px; height:22px; border-radius:0 3px 3px 0; background: var(--accent); }
.navbadge { margin-left: auto; min-width: 18px; height: 18px; padding: 0 5px; background: var(--warn); color: #1a1304;
  font-size: 10px; font-weight: 800; border-radius: 9px; display: flex; align-items: center; justify-content: center;
  font-family: 'Space Grotesk', monospace; }
.navbadge.muted { background: var(--panel-3); color: var(--text-2); }
.sidebar.collapsed .navitem { justify-content: center; padding: 9px 0; }
.sb-toggle { margin-top: 4px; display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 12px;
  border: 1px solid var(--line); background: transparent; color: var(--text-3); cursor: pointer;
  border-radius: var(--radius-sm); font-family: inherit; font-size: 12px; font-weight: 600; transition: .15s; }
.sb-toggle:hover { color: var(--text); border-color: var(--line-strong); }
.sb-toggle-ic { display: flex; transition: transform .22s; transform: rotate(180deg); }
.sb-toggle-ic.flip { transform: rotate(0deg); }
.sidebar.collapsed .sb-toggle { justify-content: center; padding: 9px 0; }
.sidebar.collapsed .sb-toggle span:last-child { display: none; }

.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar {
  position: sticky; top: 0; z-index: 25; height: 58px; flex-shrink: 0; display: flex; align-items: center;
  gap: 14px; padding: 0 22px; background: color-mix(in srgb, var(--bg-2) 86%, transparent);
  backdrop-filter: blur(14px); border-bottom: 1px solid var(--line);
}
.tb-area { display:inline-flex; align-items:center; gap:7px; white-space:nowrap; font-size:11px; font-weight:800; letter-spacing:.08em;
  color:var(--warn); background:color-mix(in srgb, var(--warn) 12%, transparent);
  border:1px solid color-mix(in srgb, var(--warn) 30%, transparent); padding:5px 11px; border-radius:20px; }
.tb-area .dot { width:6px; height:6px; border-radius:50%; background:var(--warn); }
.tb-search { flex: 1; max-width: 440px; margin: 0 auto; display: flex; align-items: center; gap: 8px;
  background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 0 10px; height: 36px; color: var(--text-3); }
.tb-search input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--text); font-family: inherit; font-size: 13px; }
.tb-search input::placeholder { color: var(--text-3); }
.tb-search kbd { font-size: 10px; color: var(--text-3); border: 1px solid var(--line); border-radius: 5px; padding: 1px 5px; font-family: 'Space Grotesk', monospace; }
.tb-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.tb-icon { width: 34px; height: 34px; border-radius: 9px; border: 0; background: transparent; color: var(--text-2);
  cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
.tb-icon:hover { background: var(--panel); color: var(--text); }
.tb-hasdot::after { content:''; position:absolute; top:7px; right:8px; width:6px; height:6px; border-radius:50%; background: var(--warn); border: 1.5px solid var(--bg-2); }
.tb-user { display: flex; align-items: center; gap: 9px; background: var(--panel); border: 1px solid var(--line);
  border-radius: 22px; padding: 4px 12px 4px 4px; cursor: pointer; color: var(--text); }
.tb-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
.tb-user-meta { display: flex; flex-direction: column; line-height: 1.15; }
.tb-user-meta b { font-size: 12.5px; font-weight: 700; }
.tb-user-meta small { font-size: 10px; color: var(--text-3); }
@media (max-width: 900px) { .tb-user-meta { display: none; } .tb-search { max-width: 200px; } }

.scroll { flex: 1; overflow-y: auto; }
.page { max-width: 1320px; margin: 0 auto; padding: 26px 26px 60px; display: flex; flex-direction: column; gap: 18px; }

/* ============ TYPE / PAGE HEAD ============ */
.eyebrow { font-size: 10.5px; letter-spacing: .15em; text-transform: uppercase; color: var(--text-3); font-weight: 700; }
.pagehead { display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; flex-wrap: wrap; }
.pagehead-l { display: flex; gap: 14px; align-items: flex-start; }
.ph-icon { width: 42px; height: 42px; flex-shrink: 0; border-radius: 12px; display: flex; align-items: center; justify-content: center;
  background: color-mix(in srgb, var(--accent) 13%, transparent); color: var(--accent); }
.ph-title { font-size: 24px; font-weight: 800; letter-spacing: -.02em; margin: 3px 0 0; }
.ph-sub { font-size: 13px; color: var(--text-2); margin: 6px 0 0; max-width: 640px; text-wrap: pretty; }
.pagehead-r { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

/* ============ BUTTONS / SEG / SEL ============ */
.btn { display: inline-flex; align-items: center; gap: 7px; border-radius: 10px; border: 1px solid var(--line);
  background: var(--panel); color: var(--text); font-family: inherit; font-weight: 600; font-size: 13px; padding: 9px 14px; cursor: pointer; transition: .15s; white-space: nowrap; }
.btn:hover { border-color: var(--line-strong); }
.btn-sm { padding: 6px 11px; font-size: 12px; }
.btn-primary { background: var(--accent); color: var(--accent-ink); border-color: transparent; font-weight: 700; }
.btn-primary:hover { filter: brightness(1.06); }
.btn-ghost { background: transparent; }
.btn-danger { color: var(--neg); border-color: color-mix(in srgb, var(--neg) 35%, transparent); background: transparent; }
.btn-danger:hover { background: color-mix(in srgb, var(--neg) 12%, transparent); border-color: var(--neg); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.seg { display: inline-flex; background: var(--panel); border: 1px solid var(--line); border-radius: 11px; padding: 3px; gap: 2px; flex-wrap: wrap; }
.seg-btn { border: 0; background: transparent; color: var(--text-2); font-family: inherit; font-weight: 600; font-size: 12.5px; padding: 6px 14px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
.seg-btn.on { background: var(--accent); color: var(--accent-ink); }
.sel { position: relative; display: inline-flex; align-items: center; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; height: 36px; padding: 0 30px 0 11px; }
.sel-ico { color: var(--text-3); margin-right: 7px; display: flex; }
.sel select { appearance: none; border: 0; background: transparent; color: var(--text); font-family: inherit; font-size: 12.5px; font-weight: 600; outline: 0; cursor: pointer; max-width: 220px; }
.sel select option { background: var(--panel); color: var(--text); }
.sel-chev { position: absolute; right: 10px; color: var(--text-3); pointer-events: none; transform: rotate(90deg); display: flex; }
.iconbtn { width: 32px; height: 32px; border-radius: 9px; border: 1px solid var(--line); background: var(--panel); color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition:.15s; }
.iconbtn:hover { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); }
.iconbtn-sm { width: 28px; height: 28px; }

/* ============ CARD ============ */
.card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 20px; box-shadow: var(--shadow); }
.card.flush { padding: 0; overflow: hidden; }
.card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.card.flush .card-head { padding: 18px 20px 0; margin-bottom: 14px; }
.card-title { font-size: 16px; font-weight: 700; letter-spacing: -.01em; margin: 3px 0 0; }
.card-sub { font-size: 12px; color: var(--text-2); margin: 5px 0 0; max-width: 620px; }
.card-head-right { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }

/* ============ BADGES / TILES ============ */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: var(--radius-pill); font-size: 10.5px; font-weight: 700; letter-spacing: .03em; white-space: nowrap; line-height: 1.4; }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.badge-pos { color: var(--pos); background: var(--chip-pos-bg); }
.badge-neg { color: var(--neg); background: var(--chip-neg-bg); }
.badge-warn { color: var(--warn); background: color-mix(in srgb, var(--warn) 15%, transparent); }
.badge-info { color: var(--info); background: color-mix(in srgb, var(--info) 14%, transparent); }
.badge-accent { color: var(--accent); background: color-mix(in srgb, var(--accent) 14%, transparent); }
.badge-violet { color: #a78bfa; background: color-mix(in srgb, #a78bfa 16%, transparent); }
.badge-neutral { color: var(--text-2); background: var(--panel-3); }
.icontile { width: 38px; height: 38px; flex-shrink: 0; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; }
.tile-accent { background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
.tile-pos { background: var(--chip-pos-bg); color: var(--pos); }
.tile-neg { background: var(--chip-neg-bg); color: var(--neg); }
.tile-warn { background: color-mix(in srgb, var(--warn) 15%, transparent); color: var(--warn); }
.tile-info { background: color-mix(in srgb, var(--info) 14%, transparent); color: var(--info); }
.tile-violet { background: color-mix(in srgb, #a78bfa 16%, transparent); color: #a78bfa; }
.tile-muted { background: var(--panel-3); color: var(--text-2); }

/* ============ KPI ============ */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 13px; }
.kpi { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 15px 16px; box-shadow: var(--shadow); display:flex; flex-direction:column; gap:4px; }
.kpi-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.kpi-label { font-size: 11.5px; color: var(--text-2); font-weight: 600; }
.kpi-value { font-size: 25px; font-weight: 800; letter-spacing: -.02em; font-family: 'Space Grotesk', monospace; margin-top: 2px; }
.kpi-sub { font-size: 11.5px; color: var(--text-3); font-weight: 600; }
.kpi.clickable { cursor: pointer; transition: .15s; }
.kpi.clickable:hover { border-color: color-mix(in srgb, var(--accent) 45%, transparent); transform: translateY(-1px); }

/* ============ DATA TABLE ============ */
.dt-wrap { width: 100%; overflow-x: auto; }
.dt { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 640px; }
.dt thead th { text-align: left; font-size: 10.5px; letter-spacing: .07em; text-transform: uppercase; color: var(--text-3);
  font-weight: 700; padding: 11px 14px; border-bottom: 1px solid var(--line); white-space: nowrap; background: var(--panel-2); position: sticky; top: 0; cursor: pointer; user-select: none; }
.dt thead th.no-sort { cursor: default; }
.dt thead th .th-in { display: inline-flex; align-items: center; gap: 5px; }
.dt thead th .th-sort { color: var(--accent); display: inline-flex; }
.dt thead th.num, .dt td.num { text-align: right; }
.dt tbody td { padding: 12px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
.dt tbody tr { transition: background .12s; }
.dt tbody tr:hover { background: var(--panel-2); }
.dt tbody tr.clickable { cursor: pointer; }
.dt tbody tr:last-child td { border-bottom: 0; }
.dt .cell-strong { font-weight: 700; }
.dt .cell-sub { font-size: 11px; color: var(--text-3); }
.dt .cell-2 { display: flex; flex-direction: column; line-height: 1.3; }
.dt-actions { display: flex; gap: 6px; justify-content: flex-end; }
.linklike { color: var(--accent); font-weight: 600; cursor: pointer; text-decoration: none; }
.linklike:hover { text-decoration: underline; }
.dt-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 13px 16px; border-top: 1px solid var(--line); flex-wrap: wrap; }
.dt-count { font-size: 12px; color: var(--text-3); }
.pager { display: flex; align-items: center; gap: 6px; }
.pager .pg-num { font-size: 12px; color: var(--text-2); font-weight: 600; padding: 0 6px; }

/* ============ FILTER BAR ============ */
.filterbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.filter-search { display: flex; align-items: center; gap: 8px; background: var(--panel); border: 1px solid var(--line);
  border-radius: 10px; padding: 0 11px; height: 36px; color: var(--text-3); min-width: 220px; flex: 1; max-width: 360px; }
.filter-search input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--text); font-family: inherit; font-size: 13px; }
.filter-search input::placeholder { color: var(--text-3); }
.toggle-pill { display: inline-flex; align-items: center; gap: 9px; background: var(--panel); border: 1px solid var(--line);
  border-radius: 10px; height: 36px; padding: 0 13px; cursor: pointer; font-size: 12.5px; font-weight: 600; color: var(--text-2); }
.toggle-pill.on { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, transparent); background: color-mix(in srgb, var(--accent) 9%, transparent); }
.toggle-sw { width: 30px; height: 17px; border-radius: 10px; background: var(--panel-3); position: relative; transition: .18s; flex-shrink: 0; }
.toggle-sw::after { content:''; position:absolute; top:2px; left:2px; width:13px; height:13px; border-radius:50%; background:var(--text-3); transition:.18s; }
.toggle-pill.on .toggle-sw { background: var(--accent); }
.toggle-pill.on .toggle-sw::after { left: 15px; background: var(--accent-ink); }

/* ============ TABS (sub-tab strip) ============ */
.subtabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
.subtab { border: 0; background: transparent; color: var(--text-2); font-family: inherit; font-weight: 600; font-size: 13px;
  padding: 11px 15px; cursor: pointer; position: relative; border-radius: 9px 9px 0 0; white-space: nowrap; }
.subtab:hover { color: var(--text); }
.subtab.on { color: var(--accent); }
.subtab.on::after { content:''; position:absolute; left:10px; right:10px; bottom:-1px; height:2px; background: var(--accent); border-radius: 2px; }

/* ============ MODAL ============ */
.modal-scrim { position: fixed; inset: 0; background: rgba(4,9,18,0.62); backdrop-filter: blur(3px); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 24px; }
.modal-card { background: var(--panel); border: 1px solid var(--line-strong); border-radius: 16px; width: 100%; max-width: 540px;
  box-shadow: 0 40px 90px -40px rgba(0,0,0,0.7); max-height: 90vh; display: flex; flex-direction: column; }
.modal-card.wide { max-width: 760px; }
.modal-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; padding: 20px 22px 14px; border-bottom: 1px solid var(--line); }
.modal-head b { font-size: 16px; font-weight: 700; display: block; margin-top: 3px; line-height: 1.25; }
.modal-head .eyebrow { line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.modal-body { padding: 18px 22px; overflow-y: auto; }
.modal-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 14px 22px; border-top: 1px solid var(--line); }
.modal-x { width: 32px; height: 32px; border-radius: 9px; border: 1px solid var(--line); background: transparent; color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.modal-x:hover { color: var(--text); }

/* ============ FORM FIELDS ============ */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: 11.5px; font-weight: 700; color: var(--text-2); letter-spacing: .02em; }
.field input, .field textarea, .field select { background: var(--bg-2); border: 1px solid var(--line); border-radius: 9px;
  padding: 10px 12px; color: var(--text); font-family: inherit; font-size: 13px; outline: 0; width: 100%; }
.field textarea { resize: vertical; min-height: 80px; font-family: 'Space Grotesk', monospace; font-size: 12px; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: color-mix(in srgb, var(--accent) 50%, transparent); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.hint { font-size: 11px; color: var(--text-3); }

/* ============ DETAIL ROWS / DEFINITION ============ */
.drow { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 11px 0; border-bottom: 1px solid var(--line); }
.drow:last-child { border-bottom: 0; }
.drow dt { font-size: 12.5px; color: var(--text-2); font-weight: 600; }
.drow dd { margin: 0; font-size: 13px; font-weight: 600; text-align: right; }

/* ============ EMPTY ============ */
.empty { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; padding: 46px 20px; }
.empty-ic { width: 52px; height: 52px; border-radius: 14px; background: var(--panel-3); color: var(--text-2); display: flex; align-items: center; justify-content: center; }
.empty b { font-size: 15px; } .empty small { font-size: 12.5px; color: var(--text-3); max-width: 380px; text-wrap: pretty; }

/* ============ BANNER / NOTE ============ */
.note { display: flex; gap: 12px; align-items: flex-start; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--line); background: var(--panel-2); }
.note-ic { flex-shrink: 0; display: flex; margin-top: 1px; }
.note-info { border-color: color-mix(in srgb, var(--info) 28%, transparent); background: color-mix(in srgb, var(--info) 8%, transparent); }
.note-info .note-ic { color: var(--info); }
.note-warn { border-color: color-mix(in srgb, var(--warn) 30%, transparent); background: color-mix(in srgb, var(--warn) 9%, transparent); }
.note-warn .note-ic { color: var(--warn); }
.note b { font-size: 13px; } .note p { margin: 3px 0 0; font-size: 12.5px; color: var(--text-2); }

/* ============ LAYOUT HELPERS ============ */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-2-13 { display: grid; grid-template-columns: 1fr 1.3fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
@media (max-width: 980px) { .grid-2, .grid-2-13, .grid-3 { grid-template-columns: 1fr; } }
.stack { display: flex; flex-direction: column; gap: 16px; }
.row-wrap { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.spacer { flex: 1; }

/* ============ QUEUE LIST (dashboard) ============ */
.qlist { display: flex; flex-direction: column; }
.qrow { display: flex; align-items: center; gap: 13px; padding: 12px 4px; border-bottom: 1px solid var(--line); }
.qrow:last-child { border-bottom: 0; }
.qrow .q-meta { display: flex; flex-direction: column; line-height: 1.3; flex: 1; min-width: 0; }
.qrow .q-meta b { font-size: 13px; } .qrow .q-meta small { font-size: 11.5px; color: var(--text-3); }
.qrow .q-count { font-size: 18px; font-weight: 800; font-family: 'Space Grotesk', monospace; }

/* role/perm cards */
.rolecards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 13px; }
.rolecard { border: 1px solid var(--line); border-radius: 13px; padding: 15px; background: var(--panel-2); display:flex; flex-direction:column; gap:10px; }
.rolecard-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.rolecard b { font-size: 14px; }
.perm-list { display: flex; flex-direction: column; gap: 5px; }
.perm-row { display: flex; align-items: center; justify-content: space-between; font-size: 11.5px; color: var(--text-2); }
.perm-row .perm-n { font-weight: 800; font-family: 'Space Grotesk', monospace; color: var(--text); }

/* risk controls */
.rc-limit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 4px; }
.rc-phase { border: 1px solid var(--line); border-radius: 12px; padding: 14px; background: var(--panel-2); }
.rc-phase-h { margin-bottom: 12px; }
.rc-killswitch { display: flex; align-items: center; justify-content: space-between; gap: 18px; flex-wrap: wrap;
  border: 1px solid var(--line-strong); border-radius: 14px; padding: 20px 22px; background: var(--panel-2); }
.rc-killswitch.on { border-color: color-mix(in srgb, var(--neg) 55%, transparent); background: color-mix(in srgb, var(--neg) 9%, transparent); }
.rc-ks-l { display: flex; align-items: center; gap: 14px; min-width: 0; }
.rc-ks-l b { font-size: 15px; display: block; }
.rc-ks-l small { font-size: 12px; color: var(--text-2); display: block; margin-top: 3px; max-width: 460px; line-height: 1.5; }
@media (max-width: 640px) { .rc-limit-grid { grid-template-columns: 1fr; } }

/* AOP submission-method toggle + account controls */
.rc-submit-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.seg-mini { display: inline-flex; border: 1px solid var(--line); border-radius: 9px; overflow: hidden; background: var(--bg-2); }
.seg-mini-b { border: 0; background: transparent; color: var(--text-3); font-family: inherit; font-weight: 600; font-size: 12px; padding: 7px 13px; cursor: pointer; }
.seg-mini-b.on { background: var(--accent); color: #fff; }
.ba-controls { display: flex; flex-direction: column; gap: 10px; }
.ba-ctl { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 13px; border: 1px solid var(--line); border-radius: 11px; background: var(--panel-2); }
.ba-ctl-l { font-size: 12.5px; color: var(--text-2); font-weight: 600; }

/* cms two-pane */
.cms-section { border: 1px solid var(--line); border-radius: 12px; padding: 15px; margin-bottom: 13px; }
.cms-section h4 { margin: 0 0 11px; font-size: 13px; display:flex; align-items:center; gap:8px; }

/* tournament cards */
.trn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 14px; }
.trn-card { border: 1px solid var(--line); border-radius: 14px; padding: 17px; background: var(--panel-2); display:flex; flex-direction:column; gap:11px; }
.trn-stats { display:flex; gap:18px; } .trn-stat small { display:block; font-size:10.5px; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; font-weight:700; }
.trn-stat b { font-size:17px; font-family:'Space Grotesk',monospace; }

@media (max-width: 760px) {
  .sidebar { position: fixed; left: 0; transform: translateX(-100%); box-shadow: 0 0 60px rgba(0,0,0,.5); }
  .sidebar.mobile-open { transform: translateX(0); }
  .page { padding: 18px 14px 50px; }
  .ph-title { font-size: 21px; }
}
</style>

<div id="root"></div>

<script>
/* Admin gate + real-data bootstrap: requires an admin session, else -> /auth. */
(function () {
  var token = null; try { token = localStorage.getItem('talero_token'); } catch (e) {}
  if (!token) { window.location.replace('/auth'); return; }
  var h = { Authorization: 'Bearer ' + token };
  fetch('/admin/me', { headers: h }).then(function (r) {
    if (!r.ok) { window.location.replace('/auth'); return null; }
    return r.json();
  }).then(function (me) {
    if (!me) return;
    window.__TALERO_ADMIN__ = { me: me };
    return Promise.all([
      fetch('/admin/summary', { headers: h }).then(function (r) { return r.json(); }),
      fetch('/admin/users', { headers: h }).then(function (r) { return r.json(); }),
      fetch('/admin/accounts', { headers: h }).then(function (r) { return r.json(); }),
      fetch('/admin/audit', { headers: h }).then(function (r) { return r.json(); })
    ]).then(function (a) {
      window.__TALERO_ADMIN__.summary = a[0]; window.__TALERO_ADMIN__.users = a[1];
      window.__TALERO_ADMIN__.accounts = a[2]; window.__TALERO_ADMIN__.audit = a[3];
    });
  }).catch(function () {});
})();
</script>
