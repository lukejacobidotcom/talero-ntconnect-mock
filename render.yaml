# Render Blueprint for the Talero NT Connect mock.
# Deploy: push this repo to GitHub -> Render -> New + -> Blueprint -> pick the repo.
# Free plan web services sleep when idle (fine for a sandbox).
services:
  - type: web
    name: talero-ntconnect-mock
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: development      # sandbox demo: installs devDeps to build TS + keeps fallback secrets working
      - key: DATA_BACKEND
        value: local           # change to "sheets" once SHEET_ID + creds are set
      - key: NTC_ENV
        value: demo
      - key: TOKEN_SECRET
        generateValue: true     # Render generates a strong secret
      - key: SHEET_ID
        sync: false             # set in dashboard when going Sheets-backed
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false             # paste the base64 service-account JSON here
      - key: GOOGLE_CLIENT_ID
        sync: false             # Google OAuth web client id (enables real Google sign-in)
      - key: GOOGLE_CLIENT_SECRET
        sync: false             # Google OAuth client secret — set in dashboard, never commit
